# Agent Skills Server - Docker Compose
# =====================================
version: '3.8'

services:
  skills-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-skills-server
    ports:
      - "8766:8766"
    environment:
      - SKILLS_PORT=8766
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=qwen-plus
      - TASK_WORKERS=3
      - SKILLS_DATA_DIR=/app/data
      - DEFAULT_SAVE_DIR=/app/output
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8766/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

